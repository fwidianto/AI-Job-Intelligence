# =============================================================================
# CI/CD Pipeline - GitHub Actions
# =============================================================================
# Runs on every push and pull request

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  contents: read

# =============================================================================
# JOBS
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  # Test Job - Runs on all supported Python versions
  # ---------------------------------------------------------------------------
  test:
    name: Test - Python ${{ matrix.python-version }}
    
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      # -------------------------------------------------------------------------
      # Checkout code
      # -------------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
      
      # -------------------------------------------------------------------------
      # Setup Python
      # -------------------------------------------------------------------------
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      # -------------------------------------------------------------------------
      # Create logs directory
      # -------------------------------------------------------------------------
      - name: Create logs directory
        run: mkdir -p logs
      
      # -------------------------------------------------------------------------
      # Install dependencies
      # -------------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # -------------------------------------------------------------------------
      # Lint code (flake8)
      # -------------------------------------------------------------------------
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      # -------------------------------------------------------------------------
      # Test scorer
      # -------------------------------------------------------------------------
      - name: Test scorer
        run: python src/main.py --test-scorer
      
      # -------------------------------------------------------------------------
      # Test help command
      # -------------------------------------------------------------------------
      - name: Test help command
        run: python src/main.py --help
      
      # -------------------------------------------------------------------------
      # Run unit tests
      # -------------------------------------------------------------------------
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker Build - Verify Dockerfile builds correctly
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: job-intelligence:test
          load: true
      
      - name: Verify Docker image
        run: docker run --rm job-intelligence:test python src/main.py --test-scorer

  # ---------------------------------------------------------------------------
  # Security Scan - Check for vulnerabilities
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Check for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --force-use-all-plugins || true

